<!doctype html>
<html>
  <head>
    <title>Deadlock Characters | Home</title>
    <meta name="description" content="A Catalog of Shows Set in Los Angeles" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
    
  </head>
  <body>
    <form class="search-container">
      <input type="text" placeholder="Search.." id="search">
      <button type="button" id="myBtn" >Search</button>
    </form>
    <header class="main-header">
        <img class = "main-img" src="https://mediaproxy.tvtropes.org/width/1200/https://static.tvtropes.org/pmwiki/pub/images/deadlock_alpha_2024.png"/>
    </header>
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <img id = "Name" src="" alt="Hero Title"/>
        <img id = "Hero" src="" alt="Hero Picture"/>
        <p id="ability1">Test</p>
        <p id="ability2">Test</p>
        <p id="ability3">Test</p>
        <p id="ability4">Test</p>
        <p id="health">Test</p>
      </div>
    </div>
  </body>
</html>
